# ============================================================
# Sentinel Dashboard Configuration (Phase 3)
# Start Sentinel Dashboard: java -jar sentinel-dashboard.jar
# Dashboard URL: http://localhost:8089
# ============================================================

spring:
  cloud:
    sentinel:
      transport:
        dashboard: localhost:8089
        port: 8719
      eager: true
      datasource:
        ds1:
          nacos:
            server-addr: localhost:8848
            data-id: ${spring.application.name}-sentinel-rules
            group-id: DEFAULT_GROUP
            data-type: json
            rule-type: flow

# Sentinel default flow rules (can be overridden via Nacos config or Dashboard)
# Flow rule: max 100 QPS per service instance, warm-up over 10s
# Degrade rule: circuit breaker at 50% error rate over 10s window
