server:
  port: 8081
spring:
  application:
    name: radarview-auth
  datasource:
    url: jdbc:mysql://localhost:3306/radarview_auth?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai
    username: root
    password: devpass
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted

jwt:
  secret: radarview-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
  expiration: 1800000
  refresh-expiration: 604800000
