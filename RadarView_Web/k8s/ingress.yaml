apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: radarview-ingress
  namespace: radarview
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "500m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/websocket-services: "notification-service"
spec:
  ingressClassName: nginx
  rules:
    - host: radarview.local
      http:
        paths:
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 8080
          - path: /tiles/
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 8080
          - path: /ws/
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
