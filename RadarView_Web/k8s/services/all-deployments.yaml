apiVersion: apps/v1
kind: Deployment
metadata:
  name: import-worker
  namespace: radarview
  labels:
    app: import-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: import-worker
  template:
    metadata:
      labels:
        app: import-worker
    spec:
      containers:
        - name: import-worker
          image: radarview-import-worker:1.0.0
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: k8s
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
