---
# -------------------- Tile Service --------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tile-service
  namespace: radarview
  labels:
    app: tile-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: tile-service
  template:
    metadata:
      labels:
        app: tile-service
    spec:
      containers:
        - name: tile-service
          image: radarview-tile:1.0.0
          ports:
            - containerPort: 8084
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: k8s
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: mbtiles
              mountPath: /data/tiles
              readOnly: true
      volumes:
        - name: mbtiles
          persistentVolumeClaim:
            claimName: mbtiles-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: tile-service
  namespace: radarview
spec:
  selector:
    app: tile-service
  ports:
    - port: 8084
      targetPort: 8084
  type: ClusterIP

