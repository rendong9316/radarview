server:
  port: 8080

spring:
  application:
    name: radarview-gateway
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin
      routes:
        - id: auth-service
          uri: lb://radarview-auth
          predicates:
            - Path=/api/v1/auth/**
        - id: track-service
          uri: lb://radarview-track
          predicates:
            - Path=/api/v1/tracks/**,/api/v1/batches/**
          filters:
            - AuthFilter
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 50
                redis-rate-limiter.burstCapacity: 100
        - id: tile-service
          uri: lb://radarview-tile
          predicates:
            - Path=/tiles/**
        - id: notification-service
          uri: lb://radarview-notification
          predicates:
            - Path=/ws/**
    nacos:
      discovery:
        server-addr: localhost:8848
  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: radarview-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
